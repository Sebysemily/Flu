# -----------------------------
# Inputs and metadata
# -----------------------------
mira_base_dir: ".."   # Base directory that contains run*/ from MIRA
flu_filtrado: "config/flu_filtrado.csv"   # Ecuador metadata/filter table used during assembly intake
context_metadata_tsv: "config/final_metadata_50_per_country_isolates.tsv"   # Curated context accessions and labels
ecuador_date_source: "collection"   # Which Ecuador date to use in FASTA headers: collection or reception

# -----------------------------
# Reproducibility and resources
# -----------------------------
random_seed: 39809473   # Base seed reused across ML tree searches and RF validation
max_threads: 18         # Default thread cap reused when a tool-specific value is not set
mafft_threads: 18       # Threads for MAFFT segment alignments
raxml_segment_threads: 18   # Threads for per-segment RAxML-NG
raxml_full_concat_threads: 18   # Threads for concatenated RAxML-NG

# -----------------------------
# BEAST exploratory runs
# -----------------------------
beast:
  enabled: true
  binary: null
  max_hours: 6
  threads: 18
  beagle:
    mode: auto
    vendor: amd
    resource: gpu
    platform: auto
    precision: auto
    scaling: default
    fallback_to_cpu: false
    info: true
  chain_length:
    strict_constant: 100000000
    strict_constant_lugar: 100000000
    ucln_constant: 120000000
    strict_exp: 100000000
    ucln_exp: 120000000
  log_every: 10000
  tree_every: 10000
  echo_every: 10000
  seeds:
    strict_constant: 3980
    strict_constant_lugar: 13980
    ucln_constant: 9473
    strict_exp: 10893
    ucln_exp: 3749
